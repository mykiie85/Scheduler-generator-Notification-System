services:
  postgres:
    image: postgres:15
    container_name: lab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-labuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-labpass}
      POSTGRES_DB: ${POSTGRES_DB:-labscheduler}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U labuser -d labscheduler"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../packages/api
      dockerfile: Dockerfile
    container_name: lab-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-labuser}:${POSTGRES_PASSWORD:-labpass}@postgres:5432/${POSTGRES_DB:-labscheduler}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      API_PORT: 3001
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../packages/web
      dockerfile: Dockerfile
    container_name: lab-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      VITE_API_URL: http://api:3001
    depends_on:
      - api

volumes:
  pgdata:
